name: fantacy11
description: A new Flutter application.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: '>=3.8.1 <4.0.0'
  flutter: 3.32.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.5
  shared_preferences: ^2.0.18
  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  flutter_phoenix: ^1.1.0
  intl: ^0.20.2
  animation_wrappers: ^3.0.0
  google_mobile_ads: ^6.0.0
  blur: ^4.0.2
  carousel_slider: ^5.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  share_plus: ^10.1.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_launcher_name:
  name: "Fantasy 11"

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/appIcon.png"

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/Icons/
    - assets/Teams/
    - assets/Medals/
    - assets/TeamLogo/
    - assets/Players/
    - assets/MockResponses/

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins/Poppins-Bold.ttf
        - asset: fonts/Poppins/Poppins-Thin.ttf
        - asset: fonts/Poppins/Poppins-Regular.ttf
        - asset: fonts/Poppins/Poppins-Medium.ttf
        - asset: fonts/Poppins/Poppins-Light.ttf
flutter_intl:
  enabled: true
